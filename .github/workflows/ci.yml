name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint + Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check src/ tests/ scripts/
          ruff format --check src/ tests/ scripts/

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=src/aurumq_rl --cov-report=term-missing

      - name: Smoke test (CLI)
        run: |
          python scripts/train.py --smoke-test --out-dir /tmp/smoke
          test -f /tmp/smoke/smoke_summary.json
          python -c "import json; s=json.load(open('/tmp/smoke/smoke_summary.json')); assert s['status']=='ok', s"

  build:
    name: Build wheel
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify wheel installs cleanly
        run: |
          pip install dist/*.whl
          python -c "from aurumq_rl import RlAgentInference, FactorPanelLoader, StockBoard; print('import OK')"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: aurumq-rl-wheel
          path: dist/*
          retention-days: 14
